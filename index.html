<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAWYER SIMULATOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #39ff14;
      --neon-dim: rgba(57, 255, 20, 0.35);
      --neon-faint: rgba(57, 255, 20, 0.08);
      --red: #ff2020;
      --yellow: #ffcc00;
      --bg: #000;
      --font: 'Share Tech Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--neon);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ─── SCANLINES ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── SCREENS ─────────────────────────────────────── */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .screen.active { display: flex; }

    /* ─── GLITCH TITLE ────────────────────────────────── */
    .glitch {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
      text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
      animation: glitch-flicker 4s infinite;
    }
    .glitch::before, .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.8;
    }
    .glitch::before {
      color: #00ffff;
      animation: glitch-shift-1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }
    .glitch::after {
      color: var(--red);
      animation: glitch-shift-2 3.5s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch-flicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.85; }
      96% { opacity: 1; }
      97% { opacity: 0.7; }
      98% { opacity: 1; }
    }
    @keyframes glitch-shift-1 {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(-4px, 1px); }
      93% { transform: translate(3px, -1px); }
      95% { transform: translate(0); }
    }
    @keyframes glitch-shift-2 {
      0%, 88%, 100% { transform: translate(0); }
      89% { transform: translate(4px, 2px); }
      92% { transform: translate(-3px, -1px); }
      94% { transform: translate(0); }
    }

    .neon-box {
      border: 1px solid var(--neon);
      box-shadow: 0 0 8px var(--neon-dim), inset 0 0 8px var(--neon-faint);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.5rem;
      font-family: var(--font);
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: transparent;
      color: var(--neon);
      border: 2px solid var(--neon);
      box-shadow: 0 0 12px var(--neon-dim);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) {
      background: var(--neon);
      color: #000;
      box-shadow: 0 0 24px var(--neon), 0 0 48px var(--neon-dim);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #screen-menu { gap: 2.5rem; text-align: center; }
    .menu-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 10px var(--neon));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .menu-footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.65rem;
      color: rgba(57,255,20,0.3);
      text-align: center;
    }

    /* ─── TRIAL SCREEN ────────────────────────────────── */
    #screen-trial {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      padding: 0.75rem;
      gap: 0.5rem;
    }
    #screen-trial.active { display: flex; }

    .trial-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
    }

    .confidence-track {
      height: 14px;
      width: 260px;
      background: rgba(57,255,20,0.07);
      border: 1px solid rgba(57,255,20,0.3);
      padding: 2px;
    }
    .confidence-fill {
      height: 100%;
      width: 50%;
      transition: width 1s ease, background 0.5s;
      background: var(--yellow);
    }
    .confidence-fill.high { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
    .confidence-fill.low { background: var(--red); box-shadow: 0 0 8px var(--red); }

    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(0,0,0,0.8);
    }

    .msg-bubble {
      max-width: 85%;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      line-height: 1.55;
      border: 1px solid rgba(57,255,20,0.25);
    }
    .msg.judge .msg-bubble { border-color: var(--neon); color: var(--neon); }
    .msg.lawyer { align-self: flex-end; }
    .msg.system .msg-bubble { color: var(--red); border-color: var(--red); }

    .input-area { display: flex; gap: 0.5rem; }
    .defense-input {
      flex: 1;
      background: #000;
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 0 1rem;
      height: 48px;
    }

    /* ─── VERDICT SCREEN ──────────────────────────────── */
    .verdict-title { font-size: 3.5rem; font-weight: 900; }
    .verdict-title.win { color: var(--neon); }
    .verdict-title.lose { color: var(--red); }
  </style>
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="menu-icon">⚖</div>
  <div class="glitch" data-text="LAWYER SIMULATOR">LAWYER SIMULATOR</div>
  <button class="btn" onclick="startCase()">>_ INICIAR CASO</button>
  <div class="menu-footer">v1.0.1 // COPYRIGHT © 2026 JOORGE'S INC.</div>
</div>

<div id="screen-trial" class="screen">
  <div class="trial-header neon-box">
    <div>
      <div id="trial-defendant" style="text-transform: uppercase;">RÉU: —</div>
      <div id="trial-crime" style="font-size: 0.75rem; opacity: 0.7;">CRIME: —</div>
    </div>
    <div>
      <div style="font-size: 0.6rem; margin-bottom: 2px;">CONFIANÇA DO JUIZ: <span id="conf-pct">50%</span></div>
      <div class="confidence-track"><div class="confidence-fill" id="conf-fill"></div></div>
    </div>
  </div>
  <div class="chat-log neon-box" id="chat-log"></div>
  <div class="input-area">
    <input type="text" class="defense-input" id="defense-input" placeholder="DIGITE SUA DEFESA..." onkeydown="handleKey(event)" />
    <button class="btn" id="btn-send" onclick="sendDefense()">ENVIAR</button>
  </div>
</div>

<div id="screen-verdict" class="screen">
  <div class="verdict-title" id="verdict-title"></div>
  <div id="verdict-prize-area"></div>
  <div id="verdict-desc" style="margin: 1rem 0;"></div>
  <button class="btn" onclick="location.reload()">VOLTAR AO MENU</button>
</div>

<script>
  const GEMINI_KEY = "AIzaSyB7-PDggcu_29L3iQPdcCxBg0WYaw3zG_U";
  const GEMINI_URL = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

  const YOUTUBERS = ["Felipe Neto", "Whindersson Nunes", "Virgínia Fonseca", "Casimiro", "Neymar Jr", "Pablo Marçal", "Monark", "Cellbit", "Gaules"];
  const CRIMES = ["fraude em rifas", "plágio de meme", "invasão do INSS", "estelionato emocional", "tráfico de spoilers", "crime contra a língua portuguesa"];

  let state = { defendant: "", crime: "", confidence: 50, history: [], playing: false };

  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function updateConfidence(value) {
    state.confidence = Math.max(0, Math.min(100, value));
    document.getElementById("conf-pct").textContent = state.confidence + "%";
    const fill = document.getElementById("conf-fill");
    fill.style.width = state.confidence + "%";
    fill.className = "confidence-fill" + (state.confidence >= 70 ? " high" : state.confidence < 30 ? " low" : "");
  }

  function appendMsg(role, text) {
    const log = document.getElementById("chat-log");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-bubble">${text}</div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function startCase() {
    state.defendant = YOUTUBERS[Math.floor(Math.random() * YOUTUBERS.length)];
    state.crime = CRIMES[Math.floor(Math.random() * CRIMES.length)];
    state.confidence = 50;
    state.history = [];
    state.playing = true;
    document.getElementById("trial-defendant").textContent = "RÉU: " + state.defendant;
    document.getElementById("trial-crime").textContent = "CRIME: " + state.crime;
    updateConfidence(50);
    show("screen-trial");
    appendMsg("judge", `O réu ${state.defendant} é acusado de ${state.crime}. A palavra é sua, advogado.`);
  }

  function handleKey(e) { if (e.key === "Enter") sendDefense(); }

  async function sendDefense() {
    const input = document.getElementById("defense-input");
    const text = input.value.trim();
    if (!text || !state.playing) return;

    appendMsg("lawyer", text);
    input.value = "";
    input.disabled = true;

    try {
      const response = await callGemini(text);
      updateConfidence(state.confidence + (response.confidenceChange || 0));
      appendMsg("judge", `${response.reaction}<br><br><b>${response.nextQuestion || ""}</b>`);
      
      if (state.confidence >= 100) setTimeout(() => showVerdict("win"), 800);
      else if (state.confidence <= 0) setTimeout(() => showVerdict("lose"), 800);
      else input.disabled = false;
    } catch (err) {
      appendMsg("system", "Erro: " + err.message);
      input.disabled = false;
    }
  }

  async function callGemini(defense) {
    const prompt = `Você é o Juiz Rodrigues, severo e irônico. Use fatos reais da vida do réu para julgá-lo.
    Réu: ${state.defendant}. Crime: ${state.crime}. Confiança: ${state.confidence}%.
    Advogado disse: "${defense}". 
    Responda APENAS JSON: {"reaction":"fala do juiz","nextQuestion":"pergunta","confidenceChange":número}`;

    const res = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.8, responseMimeType: "application/json" }
      })
    });

    if (!res.ok) throw new Error("Falha na API");
    const data = await res.json();
    return JSON.parse(data.candidates[0].content.parts[0].text);
  }

  function showVerdict(result) {
    state.playing = false;
    const title = document.getElementById("verdict-title");
    if (result === "win") {
      title.textContent = "VITÓRIA"; title.className = "verdict-title win";
      document.getElementById("verdict-desc").textContent = "Réu inocentado!";
    } else {
      title.textContent = "DERROTA"; title.className = "verdict-title lose";
      document.getElementById("verdict-desc").textContent = "Você foi preso!";
    }
    show("screen-verdict");
  }
</script>
</body>
</html>
