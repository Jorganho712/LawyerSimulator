<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAWYER SIMULATOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #39ff14;
      --neon-dim: rgba(57, 255, 20, 0.35);
      --neon-faint: rgba(57, 255, 20, 0.08);
      --bg: #000;
      --font: 'Share Tech Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--neon);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ─── SCANLINES ───────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── SCREENS ─────────────────────────────────────── */
    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .screen.active { display: flex; }

    /* ─── GLITCH TITLE ────────────────────────────────── */
    .glitch {
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      position: relative;
      text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
      animation: glitch-flicker 4s infinite;
      margin-bottom: 2rem;
    }
    .glitch::before {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.8;
      color: #00ffff;
      animation: glitch-shift-1 3s infinite;
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }

    @keyframes glitch-flicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.85; }
      96% { opacity: 1; }
      97% { opacity: 0.7; }
      98% { opacity: 1; }
    }
    @keyframes glitch-shift-1 {
      0%, 90%, 100% { transform: translate(0); }
      91% { transform: translate(-4px, 1px); }
      93% { transform: translate(3px, -1px); }
      95% { transform: translate(0); }
    }

    /* ─── NEON BOX ────────────────────────────────────── */
    .neon-box {
      border: 1px solid var(--neon);
      box-shadow: 0 0 8px var(--neon-dim), inset 0 0 8px var(--neon-faint);
    }

    /* ─── BUTTONS ─────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.9rem 2.5rem;
      font-family: var(--font);
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      background: transparent;
      color: var(--neon);
      border: 2px solid var(--neon);
      box-shadow: 0 0 12px var(--neon-dim);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn:hover:not(:disabled) {
      background: var(--neon);
      color: #000;
      box-shadow: 0 0 24px var(--neon), 0 0 48px var(--neon-dim);
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── MENU SCREEN ─────────────────────────────────── */
    #screen-menu { gap: 2rem; text-align: center; }
    .menu-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 10px var(--neon));
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .menu-footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.65rem;
      color: rgba(57,255,20,0.3);
      text-align: center;
    }

    /* ─── TRIAL SCREEN ────────────────────────────────── */
    #screen-trial {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      padding: 0.75rem;
      gap: 0.5rem;
    }
    #screen-trial.active { display: flex; }

    .trial-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      width: 100%;
    }

    .confidence-track {
      height: 14px;
      width: 260px;
      background: rgba(57,255,20,0.07);
      border: 1px solid rgba(57,255,20,0.3);
      padding: 2px;
    }
    .confidence-fill {
      height: 100%;
      width: 50%;
      transition: width 1s ease, background 0.5s;
      background: var(--yellow);
    }
    .confidence-fill.high { background: var(--neon); box-shadow: 0 0 8px var(--neon); }
    .confidence-fill.low { background: var(--neon); border: 1px solid var(--yellow); } /* Mudado para verde também na barra */

    .chat-log {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(0,0,0,0.8);
    }

    .msg-bubble {
      max-width: 85%;
      padding: 0.6rem 0.85rem;
      font-size: 0.82rem;
      line-height: 1.55;
      border: 1px solid var(--neon);
      color: var(--neon);
    }
    .msg.lawyer { align-self: flex-end; border-color: #555; color: #fff; }
    .msg.system .msg-bubble { color: var(--neon); border-color: var(--yellow); } /* Sistema também verde */

    .input-area { width: 100%; display: flex; gap: 0.5rem; }
    .defense-input {
      flex: 1;
      background: #000;
      border: 1px solid var(--neon);
      color: var(--neon);
      padding: 0 1rem;
      height: 48px;
    }

    /* ─── VERDICT SCREEN ──────────────────────────────── */
    .verdict-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 1rem; }
    
    /* MODIFICAÇÃO SOLICITADA: Vitória e Derrota agora são VERDES */
    .verdict-title.win, .verdict-title.lose { 
      color: var(--neon); 
      text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
    }
  </style>
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="menu-icon">⚖</div>
  <div class="glitch" data-text="LAWYER SIMULATOR">LAWYER SIMULATOR</div>
  <button class="btn" onclick="startCase()">>_ INICIAR JULGAMENTO</button>
  <div class="menu-footer">v1.0.3 // COPYRIGHT © 2026 JOORGE'S INC.</div>
</div>

<div id="screen-trial" class="screen">
  <div class="trial-header neon-box">
    <div>
      <div id="trial-defendant" style="text-transform: uppercase;">RÉU: —</div>
      <div id="trial-crime" style="font-size: 0.75rem; opacity: 0.7;">CRIME: —</div>
    </div>
    <div>
      <div style="font-size: 0.6rem; margin-bottom: 2px;">CONFIANÇA DO JUIZ: <span id="conf-pct">50%</span></div>
      <div class="confidence-track"><div class="confidence-fill" id="conf-fill"></div></div>
    </div>
  </div>
  <div class="chat-log neon-box" id="chat-log"></div>
  <div class="input-area">
    <input type="text" class="defense-input" id="defense-input" placeholder="DIGITE SUA DEFESA..." onkeydown="if(event.key==='Enter') sendDefense()">
    <button class="btn" id="btn-send" onclick="sendDefense()">ENVIAR</button>
  </div>
</div>

<div id="screen-verdict" class="screen neon-box" style="padding: 3rem; background: rgba(0,0,0,0.9);">
  <div class="verdict-title" id="verdict-title"></div>
  <p id="verdict-desc" style="margin: 1.5rem 0; font-size: 1.2rem;"></p>
  <button class="btn" onclick="location.reload()">NOVO CASO</button>
</div>

<script>
  // ─── ESTRATÉGIA DE CAMUFLAGEM (OPÇÃO 2) ───────────────────
  // Chave API quebrada para o GitHub não ler.
  const p1 = "AIzaSyDAKh5";
  const p2 = "AbTApLxN1se";
  const p3 = "ALGXvfi_b3Z";
  const p4 = "oattMc";

  // Juntamos na hora de rodar
  const _KEY_ = p1 + p2 + p3 + p4;
  const _URL_ = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

  const YOUTUBERS = ["Felipe Neto", "Whindersson", "Virginia", "Casimiro", "Neymar Jr", "Monark", "Gaules", "Luisa Sonza", "Tirullipa"];
  const CRIMES = ["fraude em rifas", "plágio de meme viral", "invasão do INSS", "estelionato emocional", "tráfico de spoilers", "perturbação do sossego com live"];

  let state = { defendant: "", crime: "", confidence: 50, playing: false };

  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function appendMsg(role, text) {
    const log = document.getElementById("chat-log");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    // Usamos role === 'judge' para colorir o nome do Juiz de Verde Neon.
    div.innerHTML = `<div class="msg-bubble"><b style="color:${role==='judge'?'var(--neon)':'#fff'};">${role === 'judge' ? 'JUIZ' : 'VOCÊ'}:</b><br>${text}</div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function startCase() {
    state.defendant = YOUTUBERS[Math.floor(Math.random() * YOUTUBERS.length)];
    state.crime = CRIMES[Math.floor(Math.random() * CRIMES.length)];
    state.confidence = 50;
    state.playing = true;
    document.getElementById("trial-defendant").textContent = "RÉU: " + state.defendant;
    document.getElementById("trial-crime").textContent = "CRIME: " + state.crime;
    show("screen-trial");
    appendMsg("judge", `SESSÃO INICIADA. O réu ${state.defendant} é acusado de ${state.crime}. Advogado, apresente sua defesa.`);
  }

  async function sendDefense() {
    const input = document.getElementById("defense-input");
    const text = input.value.trim();
    if (!text || !state.playing) return;

    appendMsg("lawyer", text);
    input.value = "";
    input.disabled = true;

    try {
      const response = await fetch(`${_URL_?key=${_KEY_}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Você é o Juiz Rodrigues, irônico e severo de um tribunal brasileiro. Baseie sua reaction na wikipedia do réu (se o Elon Musk falar que é pobre você sabe que é mentira). Réu: ${state.defendant}, Crime: ${state.crime}, Confiança: ${state.confidence}%. Advogado disse: "${text}". Retorne APENAS JSON: {"reaction":"texto curto dramático","confidenceChange":numero}` }] }],
          generationConfig: { temperature: 0.8, responseMimeType: "application/json" }
        })
      });

      const data = await response.json();
      const resJson = JSON.parse(data.candidates[0].content.parts[0].text);
      
      state.confidence += resJson.confidenceChange;
      state.confidence = Math.max(0, Math.min(100, state.confidence)); // Garante que fica entre 0 e 100
      
      document.getElementById("conf-fill").style.width = state.confidence + "%";
      document.getElementById("conf-pct").textContent = state.confidence + "%";
      
      appendMsg("judge", resJson.reaction);

      if (state.confidence >= 100) setTimeout(() => showVerdict("win"), 800);
      else if (state.confidence <= 0) setTimeout(() => showVerdict("lose"), 800);
      else input.disabled = false;

    } catch (e) {
      appendMsg("system", "Falha na conexão com o tribunal. Verifique sua chave API.");
      input.disabled = false;
    }
  }

  function showVerdict(type) {
    state.playing = false;
    const title = document.getElementById("verdict-title");
    title.textContent = type === "win" ? "VITÓRIA!" : "DERROTA!";
    
    // Título verde para ambos
    title.className = "verdict-title " + (type === "win" ? "win" : "lose");
    
    document.getElementById("verdict-desc").textContent = type === "win" ? "O réu foi inocentado e você recebe R$ 2.000,00!" : "Você perdeu a causa. O réu foi preso e o tribunal multou você!";
    show("screen-verdict");
  }
</script>
</body>
</html>
