<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAWYER SIMULATOR</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    /* ─── ESTILOS ORIGINAIS JOORGE'S INC ────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon: #39ff14;
      --neon-dim: rgba(57, 255, 20, 0.35);
      --neon-faint: rgba(57, 255, 20, 0.08);
      --bg: #000;
      --font: 'Share Tech Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--neon); font-family: var(--font); overflow: hidden; }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none; z-index: 9999;
    }

    .screen { display: none; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
    .screen.active { display: flex; }

    .glitch {
      font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; text-transform: uppercase;
      position: relative; text-shadow: 0 0 20px var(--neon); animation: glitch-flicker 4s infinite;
    }

    .neon-box { border: 1px solid var(--neon); box-shadow: 0 0 8px var(--neon-dim); }

    .btn {
      padding: 0.9rem 2.5rem; font-family: var(--font); font-size: 1.1rem; text-transform: uppercase;
      cursor: pointer; background: transparent; color: var(--neon); border: 2px solid var(--neon);
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

    .trial-header { display: flex; justify-content: space-between; width: 100%; padding: 1rem; margin-bottom: 0.5rem; }
    .confidence-track { height: 14px; width: 200px; background: rgba(57,255,20,0.1); border: 1px solid var(--neon); }
    .confidence-fill { height: 100%; width: 50%; background: var(--neon); transition: width 0.8s ease; }

    .chat-log { flex: 1; width: 100%; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; background: rgba(0,0,0,0.8); }
    .msg-bubble { max-width: 85%; padding: 0.8rem; border: 1px solid var(--neon); font-size: 0.9rem; line-height: 1.4; }
    .msg.lawyer { align-self: flex-end; color: #fff; border-color: #444; }
    .msg.judge { align-self: flex-start; color: var(--neon); }

    .input-area { width: 100%; display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .defense-input { flex: 1; background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 0.8rem; font-family: var(--font); outline: none; }

    /* TITULO DE VITÓRIA E DERROTA SEMPRE VERDE */
    .verdict-title { font-size: 4rem; font-weight: 900; color: var(--neon) !important; text-shadow: 0 0 20px var(--neon); }
    
    @keyframes glitch-flicker { 0%, 100% { opacity: 1; } 95% { opacity: 0.8; } }
  </style>
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="glitch" data-text="LAWYER SIMULATOR">LAWYER SIMULATOR</div>
  <button class="btn" onclick="startCase()">>_ INICIAR JULGAMENTO</button>
  <p style="margin-top: 2rem; font-size: 0.6rem; opacity: 0.4;">JOORGE'S INC // 2026</p>
</div>

<div id="screen-trial" class="screen">
  <div class="trial-header neon-box">
    <div>
      <div id="trial-defendant" style="font-weight: bold; text-transform: uppercase;">RÉU: —</div>
      <div id="trial-crime" style="font-size: 0.7rem; opacity: 0.7;">CRIME: —</div>
    </div>
    <div>
      <div style="font-size: 0.6rem;">CONFIANÇA: <span id="conf-pct">50%</span></div>
      <div class="confidence-track"><div class="confidence-fill" id="conf-fill"></div></div>
    </div>
  </div>
  <div class="chat-log neon-box" id="chat-log"></div>
  <div class="input-area">
    <input type="text" class="defense-input" id="defense-input" placeholder="DIGITE SUA DEFESA..." onkeydown="if(event.key==='Enter') sendDefense()">
    <button class="btn" id="btn-send" onclick="sendDefense()">ENVIAR</button>
  </div>
</div>

<div id="screen-verdict" class="screen">
  <div class="verdict-title" id="verdict-title">VITÓRIA</div>
  <p id="verdict-desc" style="margin: 1rem 0;"></p>
  <button class="btn" onclick="location.reload()">NOVO CASO</button>
</div>

<script>
  // ─── NOVA CHAVE FATIADA EM 4 PARTES ──────────────────────
  const p1 = "AIzaSyAMqNe";
  const p2 = "SLJfB-qcOuR";
  const p3 = "zAS5ixDatDj";
  const p4 = "1mOWGk";

  const _KEY_ = p1 + p2 + p3 + p4;
  const _URL_ = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent";

  const YOUTUBERS = ["Felipe Neto", "Whindersson", "Virginia", "Casimiro", "Neymar Jr", "Monark", "Gaules", "Cellbit", "Pablo Marçal"];
  const CRIMES = ["fraude em rifas", "plágio de conteúdo", "invasão do INSS", "estelionato emocional", "tráfico de spoilers", "mentir em live"];

  let state = { defendant: "", crime: "", confidence: 50, playing: false };

  function show(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function appendMsg(role, text) {
    const log = document.getElementById("chat-log");
    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `<div class="msg-bubble"><b>${role === 'judge' ? 'JUIZ RODRIGUES' : 'VOCÊ'}:</b><br>${text}</div>`;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function startCase() {
    state.defendant = YOUTUBERS[Math.floor(Math.random() * YOUTUBERS.length)];
    state.crime = CRIMES[Math.floor(Math.random() * CRIMES.length)];
    state.confidence = 50;
    state.playing = true;

    document.getElementById("trial-defendant").textContent = "RÉU: " + state.defendant;
    document.getElementById("trial-crime").textContent = "CRIME: " + state.crime;
    document.getElementById("chat-log").innerHTML = "";
    document.getElementById("conf-fill").style.width = "50%";
    document.getElementById("conf-pct").textContent = "50%";

    show("screen-trial");
    appendMsg("judge", `O réu ${state.defendant} é acusado de ${state.crime}. Advogado, convença-me do contrário.`);
  }

  async function sendDefense() {
    const input = document.getElementById("defense-input");
    const btn = document.getElementById("btn-send");
    const text = input.value.trim();
    
    if (!text || !state.playing) return;

    appendMsg("lawyer", text);
    input.value = "";
    input.disabled = true;
    btn.disabled = true;

    try {
      // Montagem correta da URL para evitar erro de conexão
      const response = await fetch(`${_URL_}?key=${_KEY_}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: `Você é o Juiz Rodrigues. Réu: ${state.defendant}, Crime: ${state.crime}. Responda à defesa: "${text}". Retorne APENAS JSON: {"reaction":"texto curto e ácido","confidenceChange":numero}` }] }],
          generationConfig: { responseMimeType: "application/json", temperature: 0.8 }
        })
      });

      if (!response.ok) throw new Error("Falha na API");

      const data = await response.json();
      const resJson = JSON.parse(data.candidates[0].content.parts[0].text);
      
      state.confidence += resJson.confidenceChange;
      state.confidence = Math.max(0, Math.min(100, state.confidence));
      
      document.getElementById("conf-fill").style.width = state.confidence + "%";
      document.getElementById("conf-pct").textContent = state.confidence + "%";
      
      appendMsg("judge", resJson.reaction);

      if (state.confidence >= 100) setTimeout(() => showVerdict("win"), 800);
      else if (state.confidence <= 0) setTimeout(() => showVerdict("lose"), 800);
      else {
          input.disabled = false;
          btn.disabled = false;
          input.focus();
      }

    } catch (e) {
      appendMsg("judge", "ERRO DE CONEXÃO: O tribunal está em recesso (Verifique a API Key).");
      input.disabled = false;
      btn.disabled = false;
    }
  }

  function showVerdict(type) {
    state.playing = false;
    const title = document.getElementById("verdict-title");
    title.textContent = type === "win" ? "VITÓRIA!" : "DERROTA!";
    // Força a cor verde neon
    title.style.color = "var(--neon)"; 
    document.getElementById("verdict-desc").textContent = type === "win" ? "O réu foi inocentado! Você ganhou a causa." : "Sentença de prisão decretada! Você perdeu tudo.";
    show("screen-verdict");
  }
</script>
</body>
</html>
